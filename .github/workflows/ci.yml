name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_SECRET: dev-only-change-me-to-a-long-random-string
  PUBLIC_SITE_URL: http://127.0.0.1:4173
  # Sample every session so e2e and Lighthouse runs exercise the RUM beacon.
  PUBLIC_RUM_SAMPLE_RATE: '1'
  # No commits happen on runners; skip git hook installation.
  HUSKY: '0'

jobs:
  validate:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm check

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --run

  build:
    name: Build, budget, e2e, Lighthouse
    # Quality gates first: don't burn ~10 min of browser installs on a PR that fails lint.
    needs: [validate, unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Bundle budget
        run: pnpm budget
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e
        run: pnpm test:e2e
        env:
          CI: true
      - name: Install Chrome for Lighthouse
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      - name: Lighthouse CI
        run: pnpm lhci
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
